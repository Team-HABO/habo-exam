services:
  rest-service:
    image: mcr.microsoft.com/devcontainers/dotnet:10.0
    volumes:
      # Mount the whole repo so the REST service can live at /workspace/services/rest.
      - ../../..:/workspace:cached
      # Persist NuGet packages for the devcontainer user so IDE restore state survives restarts.
      - rest-nuget:/home/vscode/.nuget/packages
    command: sleep infinity

volumes:
  rest-nuget: