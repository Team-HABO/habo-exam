name: Service GraphQL CI

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - "services/graph/**"
  pull_request:
    branches:
      - main
    paths:
      - "services/graph/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: services/graph

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "services/graph/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run database migration and seeder
        run: npm run prepare

      - name: Start GraphQL Server in Background
        run: npm start &

      - name: Wait 5 seconds
        run: sleep 5

      - name: Run Postman tests
        run: npx newman run ./docs/postman_collection.json
