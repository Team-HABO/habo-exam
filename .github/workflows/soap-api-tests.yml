name: Service SOAP CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "services/soap/**"
  push:
    branches:
      - main
    paths:
      - "services/soap/**"

defaults:
  run:
    working-directory: services/soap

jobs:
  automated-soap-api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb" --health-interval 10s
          --health-timeout 5s --health-retries 5

    env:
      CONNECTION_STRING: "Host=host.docker.internal;Port=5432;Database=testdb;Usernam\
        e=testuser;Password=testpassword"

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t soap-service .

      - name: Run SOAP service container
        run: docker run -d --name soap-service -p 5292:8080
          --add-host=host.docker.internal:host-gateway -e "CONNECTION_STRING=${{
          env.CONNECTION_STRING }}" soap-service

      - name: Wait for SOAP service
        run: |
          for i in {1..15}; do
            if curl -sSf http://localhost:5292/health > /dev/null; then
              echo "SOAP service is ready"
              exit 0
            fi
            sleep 2
          done
          echo "SOAP service failed to start"
          docker logs soap-service
          exit 1

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Run API tests
        run: |
          postman collection run ./docs/soap.postman_collection.json
